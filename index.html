<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NPC 任务模型 - Mock版（无消耗 & 修复重叠）</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eef2f3; font-family: "Microsoft YaHei", sans-serif; }
        #game-world { width: 100vw; height: 100vh; position: relative; background: #eef2f3; }
        
        /* NPC 容器（负责移动和定位） */
        .npc {
            width: 60px; height: 60px;
            position: absolute; display: flex; justify-content: center; align-items: center;
            z-index: 5;
        }

        /* NPC 身体（负责视觉：圆球、五边形、颜色） */
        .npc-body {
            width: 100%; height: 100%;
            background: #3498db; border-radius: 50%;
            transition: all 0.5s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- 【五边形黑气样式】 --- */
        .empty-mode .npc-body {
            background: #1a1a1a !important;
            border-radius: 0% !important;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            filter: drop-shadow(0 0 15px #000);
        }

        /* 黑气冒烟动画 */
        .empty-mode {
            animation: smokeAnim 1.5s infinite alternate, floatAnim 2s infinite ease-in-out;
        }

        @keyframes smokeAnim {
            0% { filter: drop-shadow(0 0 5px #000); }
            100% { filter: drop-shadow(0 -10px 20px #000); }
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- 【修复：文字气泡上移】 --- */
        .bubble {
            position: absolute; bottom: 110px; width: 160px;
            background: white; padding: 10px; border-radius: 12px;
            border: 2px solid #333; font-size: 13px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: none; z-index: 10;
        }
        .bubble::after {
            content: ''; position: absolute; bottom: -12px; left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-top: 12px solid #333;
        }

        /* --- 【修复：互动按钮下移并增加悬浮特效】 --- */
        .interact-btn {
            position: absolute; top: -30px;
            background: #ff4757; color: white; border: 2px solid #fff;
            padding: 6px 12px; cursor: pointer; border-radius: 20px;
            font-weight: bold; white-space: nowrap; z-index: 20;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
            transition: transform 0.2s; /* 动画过渡 */
        }
        .interact-btn:hover {
            transform: scale(1.1); /* 鼠标悬浮稍微放大，提升手感 */
        }

        .name-label { position: absolute; bottom: -25px; color: #7f8c8d; font-size: 12px; white-space: nowrap; }
    </style>
</head>
<body>

<div id="game-world"></div>

<script>
    const world = document.getElementById('game-world');
    let npcs =[];

    // 【Mock本地化】：模拟AI回复，0消耗且响应快
    async function getAIResponse(state, customPrompt = "") {
        // 模拟网络请求的延迟 (500毫秒)
        await new Promise(resolve => setTimeout(resolve, 500));

        // 如果是特殊的互动任务回复
        if (customPrompt.includes("变空虚成黑气怪了")) {
            const thanksResponses =[
                "谢谢你，去种地让我找回了自我！",
                "呼，钓鱼太好玩了，多亏了你救我！",
                "黑气终于散了！感觉充满力量！",
                "太感谢了，劳动果然能驱散空虚！"
            ];
            return thanksResponses[Math.floor(Math.random() * thanksResponses.length)];
        }

        // 常规状态回复 Mock 库
        const mockResponses = {
            "高兴":[
                "今天天气真好呀！", 
                "啦啦啦，心情不错~", 
                "遇到你真开心！", 
                "感觉今天会很走运！"
            ],
            "难过":[
                "唉，今天真倒霉...", 
                "心里有点堵得慌。", 
                "想一个人静静。", 
                "提不起劲来..."
            ],
            "空虚":[
                "...我是谁？我在哪？", 
                "一切都没有意义...", 
                "好累，想消失。", 
                "周围好黑啊..."
            ]
        };

        const responses = mockResponses[state] || ["..."];
        return responses[Math.floor(Math.random() * responses.length)];
    }

    function createNPC(id) {
        const el = document.createElement('div');
        el.className = 'npc';
        el.innerHTML = `
            <div class="bubble" id="bubble-${id}">连接中...</div>
            <div id="btn-container-${id}"></div>
            <div class="npc-body" id="body-${id}"></div>
            <div class="name-label">NPC ${id+1}</div>
        `;

        const npcObj = {
            id: id,
            el: el,
            body: el.querySelector('.npc-body'),
            x: Math.random() * (window.innerWidth - 100) + 50,
            y: Math.random() * (window.innerHeight - 100) + 50,
            dx: (Math.random() - 0.5) * 2,
            dy: (Math.random() - 0.5) * 2,
            state: "高兴",
            isFrozen: false,
            hasBeenEmpty: false
        };

        world.appendChild(el);
        npcs.push(npcObj);
        refreshDialogue(npcObj);
        setInterval(() => updateLogic(npcObj), 6000);
    }

    async function updateLogic(npc) {
        if (npc.isFrozen) return;
        let rand = Math.random();
        if (rand < 0.25 && !npc.hasBeenEmpty) {
            triggerEmptyQuest(npc);
        } else {
            npc.state = Math.random() > 0.5 ? "高兴" : "难过";
            refreshDialogue(npc);
        }
    }

    async function refreshDialogue(npc, customPrompt) {
        const bubble = document.getElementById(`bubble-${npc.id}`);
        if (npc.state === "高兴") npc.body.style.background = "#f1c40f";
        else if (npc.state === "难过") npc.body.style.background = "#3498db";

        const text = await getAIResponse(npc.state, customPrompt);
        bubble.innerText = text;
    }

    function triggerEmptyQuest(npc) {
        npc.state = "空虚";
        npc.isFrozen = true;
        
        // 视觉：变五边形+黑气
        npc.el.classList.add('empty-mode');
        refreshDialogue(npc);

        const btnContainer = document.getElementById(`btn-container-${npc.id}`);
        const btn = document.createElement('button');
        btn.className = 'interact-btn';
        btn.innerText = '⚒️ 扔出铁镐 (互动)';
        
        btn.onclick = async () => {
            const bubble = document.getElementById(`bubble-${npc.id}`);
            bubble.innerText = "💥 正在驱散黑气...";
            
            const thanksText = await getAIResponse("高兴", "我刚才变空虚成黑气怪了，谢谢你建议我去种地/钓鱼救了我。请说一句感激的话。");
            bubble.innerText = thanksText;
            
            setTimeout(() => {
                npc.el.classList.remove('empty-mode');
                npc.isFrozen = false;
                npc.hasBeenEmpty = true;
                npc.state = "高兴";
                btn.remove();
            }, 3500);
        };
        btnContainer.appendChild(btn);
    }

    function animate() {
        npcs.forEach(npc => {
            if (!npc.isFrozen) {
                npc.x += npc.dx;
                npc.y += npc.dy;
                // 碰到屏幕边缘反弹
                if (npc.x <= 20 || npc.x >= window.innerWidth - 80) npc.dx *= -1;
                if (npc.y <= 20 || npc.y >= window.innerHeight - 80) npc.dy *= -1;
                npc.el.style.left = npc.x + 'px';
                npc.el.style.top = npc.y + 'px';
            }
        });
        requestAnimationFrame(animate);
    }

    for (let i = 0; i < 3; i++) createNPC(i);
    animate();
</script>
</body>
</html>
